version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8200:8000"
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - cctv-net

  reid-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "5555:5555"
    volumes:
      - ./dataset:/app/dataset:ro
    command: >
      --video_sources '{"cam_1": "/app/dataset/test/S06/c041/vdo.avi", "cam_2": "/app/dataset/test/S06/c042/vdo.avi"}'
    depends_on:
      - chromadb
    networks:
      - cctv-net

  camera-1:
    build:
      context: .
      dockerfile: Dockerfile.camera
      # Use Dockerfile.camera.gpu and uncomment deploy block for GPU inference
    volumes:
      - ./dataset:/app/dataset:ro
      - ./agent-working/trained_models:/app/models:ro
    command: >
      --camera_id cam_1
      --video_source /app/dataset/test/S06/c041/vdo.avi
      --zmq_endpoint tcp://reid-server:5555
      --reid_model_name resnet101_ibn_a
      --reid_model_path /app/models/101a_384/v1/resnet101_ibn_a_2.pth
    depends_on:
      - reid-server
    networks:
      - cctv-net
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  camera-2:
    build:
      context: .
      dockerfile: Dockerfile.camera
    volumes:
      - ./dataset:/app/dataset:ro
      - ./agent-working/trained_models:/app/models:ro
    command: >
      --camera_id cam_2
      --video_source /app/dataset/test/S06/c042/vdo.avi
      --zmq_endpoint tcp://reid-server:5555
      --reid_model_name resnet101_ibn_a
      --reid_model_path /app/models/101a_384/v1/resnet101_ibn_a_2.pth
    depends_on:
      - reid-server
    networks:
      - cctv-net

  inference-node:
    build:
      context: .
      dockerfile: Dockerfile.inference
    ports:
      - "8100:8100"
    volumes:
      - ./dataset:/app/dataset:ro
    command: >
      --chroma_host chromadb
      --chroma_port 8000
      --api_port 8100
      --retrieval_model google/siglip2-base-patch16-224
      --reasoning_model microsoft/Florence-2-base-ft
      --retrieval_top_k 20
      --rerank_top_k 5
      --video_sources '{"cam_1": "/app/dataset/test/S06/c041/vdo.avi", "cam_2": "/app/dataset/test/S06/c042/vdo.avi"}'
    depends_on:
      - chromadb
      - reid-server
    networks:
      - cctv-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  chroma-data:

networks:
  cctv-net:
    driver: bridge
